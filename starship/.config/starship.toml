add_newline = true

# Prompt layout:
# Line 1: directory > git branch/status ......... time > command duration
# Line 2: VI mode indicator > prompt character
# The $fill module pushes time and duration to the right side.
format = """$hostname$directory$git_branch$git_status$fill$time$cmd_duration$line_break${env_var.STARSHIP_VI_NORMAL}${env_var.STARSHIP_VI_INSERT}$character"""
palette = "catppuccin_mocha"

# Increase timeout from default (500ms)
command_timeout = 1000

# Use λ as the prompt character, colored by last command's exit status
[character]
success_symbol = '[λ](bold green)'
error_symbol = '[λ](bold red)'
vimcmd_symbol = '[λ](bold blue)'

# VI mode indicators set via STARSHIP_VI_NORMAL/INSERT env vars in .zshrc
# Shows "N│" (blue) in normal mode or "I│" (green) in insert mode
[env_var.STARSHIP_VI_NORMAL]
format = '([$env_value│](bold blue))'

[env_var.STARSHIP_VI_INSERT]
format = '([$env_value│](bold green))'

# Invisible fill to push time/duration to the right side of the prompt
[fill]
symbol = ' '

# Show hostname always, in peach to match tmux host module
[hostname]
ssh_only = false
format = '[$ssh_symbol\[$hostname\]]($style) '
style = 'bold peach'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'

# Disable language version indicators and icons to keep the prompt minimal
[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[c]
disabled = true

[java]
disabled = true

[dotnet]
disabled = true

# Show clock in 12-hour format on the right side of the prompt
[time]
disabled = false
time_format = "%I:%M"
format = '[$time ]($style)'

# Show elapsed time for long-running commands
[cmd_duration]
format = '[($duration) ]($style)'

# Catppuccin Mocha color palette
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
