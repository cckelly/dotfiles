# Replace prefix key with Ctrl+Space
unbind C-b
set -g prefix C-space

# This will send Ctrl+Space to a process within tmux if needed
bind C-space send-prefix

# Re-source .tmux.config with prefix+r
unbind r
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"

# Remove mode switch (escape) delay
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 100000

# Enable mouse mode
set -g mouse on

# Need to set these so catppuccin renders correctly
set-option -g default-terminal "screen-256color"
set-option -g terminal-overrides ",xterm-256color:RGB"

# Set windw and pane index to 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when closed
set -g renumber-windows on

# Allow tmux to write to MacOS clipboard
set -g set-clipboard on

# Automatically switch to existing session
# if one exists when killing a session
set -g detach-on-destroy off

# Passthrough focus events (e.g. Neovim buffer auto-reloaded)
set-option -g focus-events on

# Make sure named windows don't inherit name of runnig command
set-option -g allow-rename off

# Copy mode uses VI motions
set -g mode-keys vi

# Set command prompt to VI editing
set -g status-keys vi

# Split keybindings
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Set new windows to be current working directory
bind c new-window -c "#{pane_current_path}"

# Map x to kill panes without confirm
bind-key x kill-pane

# Pane resizing keybindings
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Pane zoom/maximize
bind m resize-pane -Z

# Copy mode keybindings to be more VI-like
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection

# Switch sessions
bind S switch-client -l

# Switch windows
bind W last-window

# Shift+Enter sends newline to the terminal (e.g. for Claude Code)
bind-key -n ‰ send-keys -H 0a

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window styling
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_current_number_color "#{@thm_peach}"

# Pane borders
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_peach}"

# Date/time format
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"
set -g @catppuccin_directory_text "#{pane_current_path}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Catppuccin status bar
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

