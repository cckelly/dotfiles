# Replace prefix key with Ctrl+Space
unbind C-b
set -g prefix C-space

# This will send Ctrl+Space to a process within tmux if needed
bind C-space send-prefix

# Re-source .tmux.config with prefix+r
unbind r
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"

# Remove mode switch (escape) delay
set -s escape-time 0

# How long to wait after the prefix for a command
# Increased from the default of 500ms while I get used to the keybinds :)
set -g repeat-time 1000

# Increase scrollback buffer size
set -g history-limit 100000

# Enable mouse mode
set -g mouse on

# Need to set these so catppuccin renders correctly
set-option -g default-terminal "screen-256color"
set-option -g terminal-overrides ",xterm-256color:RGB"

# Set windw and pane index to 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when closed
set -g renumber-windows on

# Allow tmux to write to MacOS clipboard
set -g set-clipboard on

# Automatically switch to existing session
# if one exists when killing a session
set -g detach-on-destroy off

# Passthrough focus events (e.g. Neovim buffer auto-reloaded)
set-option -g focus-events on

# Make sure named windows don't inherit name of runnig command
set-option -g allow-rename off

# Copy mode uses VI motions
set -g mode-keys vi

# Set command prompt to VI editing
set -g status-keys vi

# Split keybindings
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in the current directory, inserted after the current window
bind c new-window -a -c "#{pane_current_path}"

# Pane resizing keybindings
bind -r h resize-pane -L 1
bind -r j resize-pane -D 1
bind -r k resize-pane -U 1
bind -r l resize-pane -R 1
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane zoom/maximize
bind m resize-pane -Z

# Equalize all pane sizes
bind e select-layout tiled

# Override kill pane and kill window bindings (without confirmation)
bind x kill-pane

# Prompt for which window to kill; type a window number or just Enter for current 
bind X command-prompt -p "Kill window: " "kill-window -t '%%'"

# Kill tmux server (with confirmation)
bind Q confirm-before -p "Kill tmux server? (y/n)" kill-server

# Copy mode keybindings to be more VI-like
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection

# Switch sessions
bind S switch-client -l

# Maps session tree and session indices to be 1-based
bind s choose-tree -s -Z -K "#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|<:#{line},36},M-#{a:#{e|+:97,#{e|-:#{line},10}}},}}"

# Switch windows
bind W last-window

# Reorder windows left/right and follow the window as it moves
bind -r '<' swap-window -t -1\; select-window -t -1
bind -r '>' swap-window -t +1\; select-window -t +1

# Shift+Enter sends newline to the terminal (e.g. for Claude Code)
bind-key -n ‰ send-keys -H 0a

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Window styling
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"

# Pane borders
set -g pane-border-lines double
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_mauve}"

# Date/time format
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"
set -g @catppuccin_directory_text "#{pane_current_path}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'



# Catppuccin status bar
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

